<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Porta do Jardim</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;overscroll-behavior:none;user-select:none;-webkit-user-select:none}
.scene{position:relative;width:100vw;height:100vh;overflow:hidden;background:#000;perspective:1200px}
.garden{position:absolute;inset:0;z-index:0;background:radial-gradient(circle at 50% 45%,rgba(255,215,150,.95),rgba(255,157,198,.65) 28%,rgba(88,38,65,.75) 58%,#120916 100%);opacity:0;transition:opacity 1.1s ease;filter:saturate(1.15)}
.garden::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.55),transparent 28%);filter:blur(18px);opacity:.8}
.door-base,.door-half,.frame-correto,.video-final{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.door-base{z-index:1;opacity:1}
.door-half{z-index:2;transition:transform 2.1s cubic-bezier(.25,.8,.2,1),filter 1.1s ease;backface-visibility:hidden;will-change:transform;transform-style:preserve-3d}
.door-left{clip-path:polygon(0 0,50% 0,50% 100%,0 100%);transform-origin:left center}
.door-right{clip-path:polygon(50% 0,100% 0,100% 100%,50% 100%);transform-origin:right center}
.chave{position:absolute;width:42vw;max-width:340px;left:18%;top:68%;z-index:6;transform:translate(-50%,-50%) rotate(90deg);transform-origin:18% 50%;touch-action:none;cursor:grab;filter:drop-shadow(0 8px 14px rgba(0,0,0,.7));will-change:left,top,transform,opacity,width}
.chave.girar{animation:girarChaveMobile 1.55s cubic-bezier(.3,.05,.18,1) forwards}
@keyframes girarChaveMobile{0%{transform:translate(-50%,-50%) rotate(90deg)}100%{transform:translate(-50%,-50%) rotate(270deg)}}
.frame-correto{z-index:7;opacity:0;pointer-events:none;transition:opacity .4s ease}
.video-final{z-index:9;opacity:0;pointer-events:none;background:#000;transition:opacity .35s ease}
.glow{position:absolute;left:50%;top:48%;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(255,224,138,1),rgba(255,178,66,.45),transparent 70%);transform:translate(-50%,-50%) scale(.6);filter:blur(16px);opacity:0;z-index:5;pointer-events:none}.glow.active{animation:glowAnim 2.4s ease forwards}@keyframes glowAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}45%{opacity:1;transform:translate(-50%,-50%) scale(1.25)}100%{opacity:.3;transform:translate(-50%,-50%) scale(1.8)}}
.instrucao{position:absolute;left:0;right:0;bottom:calc(6% + env(safe-area-inset-bottom));z-index:20;text-align:center;color:#ffe7ad;font-family:Georgia,serif;font-size:clamp(16px,4vw,20px);text-shadow:0 0 12px #000;animation:pulse 1.6s infinite;padding:0 16px}@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
.scene.unlocked .instrucao{display:none}.scene.unlocked .garden{opacity:1}.scene.opening .door-left{transform:rotateY(-52deg);filter:brightness(1.08)}.scene.opening .door-right{transform:rotateY(52deg);filter:brightness(1.08)}.scene.opening .door-base{opacity:0;transition:opacity 1.05s ease .3s}.scene.video-on .video-final{opacity:1}
</style>
</head>
<body>
<div class="scene" id="scene">
  <div class="garden"></div>
  <img class="door-base" src="./porta.png" alt="porta" draggable="false" />
  <img class="door-half door-left" src="./porta.png" alt="porta esquerda" draggable="false" />
  <img class="door-half door-right" src="./porta.png" alt="porta direita" draggable="false" />
  <div class="glow" id="glow"></div>
  <img class="chave" id="chave" src="./chave.png" alt="chave" draggable="false" />
  <img class="frame-correto" id="frameCorreto" src="./frame-correto.png" alt="chave encaixada" draggable="false" />
  <video class="video-final" id="videoFinal" muted playsinline webkit-playsinline preload="auto" controlslist="nodownload nofullscreen noremoteplayback" disablepictureinpicture>
    <source src="./chave-girando.mp4" type="video/mp4" />
  </video>
  <div class="instrucao" id="instrucao">Arraste a chave até a fechadura</div>
</div>
<script>
const LINK_CONVITE = "https://convite-digital.com/c/lauracecilia";
const scene = document.getElementById("scene");
const chave = document.getElementById("chave");
const frameCorreto = document.getElementById("frameCorreto");
const videoFinal = document.getElementById("videoFinal");
const glow = document.getElementById("glow");
let dragging=false, unlocked=false, offsetX=0, offsetY=0;
const alvo = { x:50, y:48 };
const distanciaPermitida = 280;

function getPoint(e){return e.touches && e.touches.length ? e.touches[0] : e}
function prepararVideoMobile(){
  videoFinal.muted = true;
  videoFinal.setAttribute("muted", "");
  videoFinal.setAttribute("playsinline", "");
  videoFinal.setAttribute("webkit-playsinline", "");
  videoFinal.load();
}
function start(e){
  if(unlocked)return;
  prepararVideoMobile();
  dragging=true;
  chave.style.transition="none";
  const p=getPoint(e), r=chave.getBoundingClientRect();
  offsetX=p.clientX-r.left;
  offsetY=p.clientY-r.top;
  e.preventDefault();
}
function move(e){
  if(!dragging||unlocked)return;
  const p=getPoint(e);
  chave.style.left=(p.clientX-offsetX+chave.offsetWidth/2)+"px";
  chave.style.top=(p.clientY-offsetY+chave.offsetHeight/2)+"px";
  e.preventDefault();
}
function end(){
  if(!dragging||unlocked)return;
  dragging=false;
  const s=scene.getBoundingClientRect(), k=chave.getBoundingClientRect();
  const cx=k.left+k.width/2, cy=k.top+k.height/2;
  const ax=s.width*alvo.x/100, ay=s.height*alvo.y/100;
  const dist=Math.hypot(cx-ax,cy-ay);
  if(dist<distanciaPermitida){encaixar()}else{
    chave.style.transition=".45s ease";
    chave.style.left="18%";
    chave.style.top="68%";
    chave.style.width="42vw";
    chave.style.maxWidth="340px";
    chave.style.transform="translate(-50%,-50%) rotate(90deg)";
  }
}
function encaixar(){
  unlocked=true;
  scene.classList.add("unlocked");
  chave.style.transition=".75s ease";
  chave.style.left="66%";
  chave.style.top="42%";
  chave.style.width="45vw";
  chave.style.maxWidth="360px";
  chave.style.transform="translate(-50%,-50%) rotate(90deg)";
  setTimeout(()=>{
    glow.classList.add("active");
    sparkles();
    chave.classList.add("girar");
  },800);
  setTimeout(()=>{
    frameCorreto.style.opacity="1";
    chave.style.opacity="0";
  },2450);
  setTimeout(()=>{
    frameCorreto.style.opacity="0";
    abrirPorta();
  },2950);
}
function abrirPorta(){
  scene.classList.add("opening");
  setTimeout(()=>{tocarVideo()},2200);
}
function tocarVideo(){
  scene.classList.add("video-on");
  videoFinal.style.opacity="1";
  videoFinal.currentTime=0;
  videoFinal.muted=true;
  const fallback=setTimeout(()=>{window.location.replace(LINK_CONVITE)},12000);
  const playPromise=videoFinal.play();
  if(playPromise!==undefined){
    playPromise.catch(()=>{clearTimeout(fallback);window.location.replace(LINK_CONVITE)});
  }
  videoFinal.addEventListener("ended",()=>{
    clearTimeout(fallback);
    window.location.replace(LINK_CONVITE);
  },{once:true});
}
function sparkles(){
  for(let i=0;i<45;i++){
    const s=document.createElement("span");
    s.style.position="absolute";s.style.left="50%";s.style.top="48%";s.style.width="5px";s.style.height="5px";s.style.borderRadius="50%";s.style.background="#ffd889";s.style.boxShadow="0 0 12px #ffd889";s.style.zIndex="12";s.style.pointerEvents="none";
    scene.appendChild(s);
    const a=Math.random()*Math.PI*2,d=40+Math.random()*135,x=Math.cos(a)*d,y=Math.sin(a)*d;
    s.animate([{transform:"translate(-50%,-50%) scale(0)",opacity:1},{transform:`translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(1)`,opacity:0}],{duration:1700,easing:"ease-out",delay:Math.random()*350});
    setTimeout(()=>s.remove(),2200);
  }
}

if(window.PointerEvent){
  chave.addEventListener("pointerdown",start,{passive:false});
  window.addEventListener("pointermove",move,{passive:false});
  window.addEventListener("pointerup",end);
  window.addEventListener("pointercancel",end);
}else{
  chave.addEventListener("mousedown",start);
  chave.addEventListener("touchstart",start,{passive:false});
  window.addEventListener("mousemove",move);
  window.addEventListener("touchmove",move,{passive:false});
  window.addEventListener("mouseup",end);
  window.addEventListener("touchend",end);
}
prepararVideoMobile();
</script>
</body>
</html>
