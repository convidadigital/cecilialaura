<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chave Mágica</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none}
.scene{position:relative;width:100vw;height:100vh;overflow:hidden;background:#000}
.porta,.frame,.video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.porta{z-index:1}.chave{position:absolute;width:42vw;max-width:340px;left:20%;top:65%;z-index:5;transform:translate(-50%,-50%) rotate(90deg);touch-action:none;cursor:grab;filter:drop-shadow(0 8px 14px rgba(0,0,0,.7))}.frame{z-index:6;opacity:0;pointer-events:none}.video{z-index:7;opacity:0;pointer-events:none;background:#000}.texto{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;color:#ffd889;font-family:Georgia,serif;font-size:clamp(34px,8vw,72px);text-align:center;opacity:0;text-shadow:0 0 20px #ffc85c;pointer-events:none}.texto.show{opacity:1;transition:1.4s ease}.instrucao{position:absolute;bottom:6%;width:100%;z-index:30;text-align:center;color:#ffe3a0;font-family:Georgia,serif;font-size:18px;text-shadow:0 0 10px #000;animation:pulse 1.6s infinite}@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
</style>
</head>
<body>
<div class="scene" id="scene">
  <img class="porta" src="./porta.png" alt="porta">
  <img class="chave" id="chave" src="./chave.png" alt="chave">
  <img class="frame" id="frame" src="./frame-correto.png" alt="frame correto">
  <video class="video" id="video" muted playsinline webkit-playsinline preload="auto">
    <source src="./chave-girando.mp4" type="video/mp4">
  </video>
  <div class="texto" id="texto">A porta se abriu</div>
  <div class="instrucao" id="instrucao">Arraste a chave até a fechadura</div>
</div>
<script>
const scene=document.getElementById("scene"),chave=document.getElementById("chave"),frame=document.getElementById("frame"),video=document.getElementById("video"),texto=document.getElementById("texto"),instrucao=document.getElementById("instrucao");let arrastando=false,finalizado=false,offsetX=0,offsetY=0;const pontoFechadura={x:52,y:48};function ponto(e){return e.touches?e.touches[0]:e}function iniciar(e){if(finalizado)return;arrastando=true;chave.style.transition="none";const p=ponto(e),r=chave.getBoundingClientRect();offsetX=p.clientX-r.left;offsetY=p.clientY-r.top;e.preventDefault()}function mover(e){if(!arrastando||finalizado)return;const p=ponto(e);chave.style.left=p.clientX-offsetX+chave.offsetWidth/2+"px";chave.style.top=p.clientY-offsetY+chave.offsetHeight/2+"px";e.preventDefault()}function soltar(){if(!arrastando||finalizado)return;arrastando=false;const sceneRect=scene.getBoundingClientRect(),chaveRect=chave.getBoundingClientRect();const centroChaveX=chaveRect.left+chaveRect.width/2,centroChaveY=chaveRect.top+chaveRect.height/2;const alvoX=sceneRect.width*pontoFechadura.x/100,alvoY=sceneRect.height*pontoFechadura.y/100;const distancia=Math.hypot(centroChaveX-alvoX,centroChaveY-alvoY);if(distancia<260)encaixar()}function encaixar(){finalizado=true;instrucao.style.display="none";chave.style.transition=".9s ease";chave.style.left="50%";chave.style.top="50%";chave.style.width="100vw";chave.style.maxWidth="none";chave.style.transform="translate(-50%,-50%) rotate(0deg)";chave.style.opacity="0";frame.style.transition=".7s ease";frame.style.opacity="1";setTimeout(tocarVideo,900)}function tocarVideo(){frame.style.opacity="0";video.style.opacity="1";video.currentTime=0;const playPromise=video.play();if(playPromise!==undefined){playPromise.catch(()=>{texto.classList.add("show")})}}video.addEventListener("ended",()=>{texto.classList.add("show")});chave.addEventListener("mousedown",iniciar);chave.addEventListener("touchstart",iniciar,{passive:false});window.addEventListener("mousemove",mover);window.addEventListener("touchmove",mover,{passive:false});window.addEventListener("mouseup",soltar);window.addEventListener("touchend",soltar);
</script>
</body>
</html>
